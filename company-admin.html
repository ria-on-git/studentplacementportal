<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlaceIt — Company Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', Courier, monospace; background-color: #1c1c1c; color: #f0f0f0; min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px; border-bottom: 1px solid #3d3d3d;
      position: sticky; top: 0; z-index: 100; background-color: #1c1c1c;
    }
    .logo { font-weight: 800; font-size: 23px; }
    .logo span { color: #e8503a; }
    .company-badge {
      background-color: rgba(232,80,58,0.15);
      border: 1px solid rgba(232,80,58,0.4);
      color: #f5a190; font-size: 12px;
      padding: 4px 12px; border-radius: 999px; margin-left: 12px;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .logout-btn {
      background: none; border: 1.5px solid #3d3d3d;
      color: #888888; font-family: 'Courier New', Courier, monospace;
      font-size: 14px; padding: 7px 16px; border-radius: 8px; cursor: pointer;
    }
    .logout-btn:hover { border-color: #e8503a; color: #e8503a; }
    #page-dashboard { padding: 40px; }
    .dash-tabs {
      display: flex; gap: 6px; margin-bottom: 32px;
      border-bottom: 1px solid #3d3d3d;
    }
    .dash-tab {
      padding: 10px 20px; border-radius: 10px 10px 0 0;
      cursor: pointer; font-size: 14px; color: #888888;
      border: 1px solid transparent; border-bottom: none; margin-bottom: -1px;
    }
    .dash-tab:hover { color: #f0f0f0; }
    .dash-tab.active { background-color: #2e2e2e; color: #f0f0f0; border-color: #3d3d3d; border-bottom-color: #2e2e2e; }
    .dash-panel { display: none; }
    .dash-panel.active { display: block; }
    .panel-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .panel-sub { color: #888888; font-size: 14px; margin-bottom: 28px; }
    .card { background-color: #2e2e2e; border: 1px solid #3d3d3d; border-radius: 14px; padding: 28px; margin-bottom: 16px; }
    .btn { display: inline-block; padding: 11px 26px; border-radius: 10px; border: none; font-family: 'Courier New', Courier, monospace; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background-color: #e8503a; color: #fff; }
    .btn-danger { background-color: transparent; color: #e8503a; border: 1.5px solid #e8503a; font-size: 13px; padding: 6px 14px; }
    .btn-danger:hover { background-color: rgba(232,80,58,0.1); }
    .btn-small { padding: 8px 16px; font-size: 13px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; color: #888888; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px 16px; background-color: #252525;
      border: 1.5px solid #3d3d3d; border-radius: 10px; color: #f0f0f0;
      font-family: 'Courier New', Courier, monospace; font-size: 14px; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #e8503a; }
    .form-group select option { background-color: #252525; }
    .form-group textarea { resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .job-list-item {
      background-color: #2e2e2e; border: 1px solid #3d3d3d;
      border-radius: 12px; padding: 20px 24px; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .job-list-item:hover { border-color: #e8503a; }
    .job-list-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .job-list-info p { color: #888888; font-size: 13px; }
    .meta-pill { padding: 4px 11px; border-radius: 6px; font-size: 12px; background-color: #252525; color: #888888; border: 1px solid #3d3d3d; }
    .pill-red { background-color: rgba(232,80,58,0.1); color: #f5a190; border-color: rgba(232,80,58,0.25); }
    .applicant-select {
      width: 100%; max-width: 360px; padding: 10px 16px;
      background-color: #252525; border: 1.5px solid #3d3d3d;
      border-radius: 10px; color: #f0f0f0;
      font-family: 'Courier New', Courier, monospace; font-size: 14px; outline: none; margin-bottom: 20px;
    }
    .applicant-select:focus { border-color: #e8503a; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .data-table th { text-align: left; padding: 12px 16px; color: #888888; font-weight: 600; border-bottom: 1px solid #3d3d3d; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .data-table td { padding: 14px 16px; border-bottom: 1px solid #252525; }
    .data-table tr:hover td { background-color: #252525; }
    .data-table tr:last-child td { border-bottom: none; }
    #popup { display: none; position: fixed; bottom: 32px; right: 32px; background-color: #2e2e2e; border: 1px solid #f0e6d3; color: #f0e6d3; padding: 13px 22px; border-radius: 10px; font-size: 14px; z-index: 999; }
    footer { text-align: center; padding: 32px; color: #888888; font-size: 13px; border-top: 1px solid #3d3d3d; margin-top: 64px; }
  </style>
</head>
<body>

<nav>
  <div style="display:flex; align-items:center;">
    <div class="logo">Place<span>d</span></div>
    <span class="company-badge" id="company-badge">Company</span>
  </div>
  <div class="nav-right">
    <span id="nav-company-name" style="color:#888888; font-size:14px;"></span>
    <button class="logout-btn" onclick="handleLogout()">Sign out</button>
  </div>
</nav>

<div id="page-dashboard" style="padding:40px;">
  <div class="dash-tabs">
    <div class="dash-tab active" onclick="switchTab('post')">📝 Post Job</div>
    <div class="dash-tab" onclick="switchTab('manage')">📋 Our Jobs</div>
    <div class="dash-tab" onclick="switchTab('applicants')">👥 Applicants</div>
  </div>

  <!-- POST JOB -->
  <div id="panel-post" class="dash-panel active">
    <div class="panel-title">Post a New Job</div>
    <p class="panel-sub">Add a new opening for your company.</p>
    <div class="card" style="max-width:680px;">
      <div class="form-row">
        <div class="form-group">
          <label>Job Title</label>
          <input type="text" id="new-title" placeholder="e.g. Software Engineer" />
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="new-type">
            <option>Full-time</option>
            <option>Internship</option>
            <option>Contract</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tag / Domain</label>
          <select id="new-tag">
            <option value="tech">Tech</option>
            <option value="finance">Finance</option>
            <option value="core">Core</option>
            <option value="consulting">Consulting</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="new-location" placeholder="e.g. Bangalore" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>CTC / Stipend</label>
          <input type="text" id="new-ctc" placeholder="e.g. 12 LPA" />
        </div>
        <div class="form-group">
          <label>Min CGPA</label>
          <input type="number" id="new-cgpa" placeholder="7.0" min="0" max="10" step="0.1" />
        </div>
      </div>
      <div class="form-group">
        <label>Required Skills (comma separated)</label>
        <input type="text" id="new-skills" placeholder="Python, SQL, ML" />
      </div>
      <div class="form-group">
        <label>Job Description</label>
        <textarea id="new-desc" rows="4" placeholder="Describe the role..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="postJob()">Post Job →</button>
    </div>
  </div>

  <!-- OUR JOBS -->
  <div id="panel-manage" class="dash-panel">
    <div class="panel-title">Our Job Listings</div>
    <p class="panel-sub">Jobs posted by your company.</p>
    <div id="manage-jobs-list"><p style="color:#888888;">Loading...</p></div>
  </div>

  <!-- APPLICANTS -->
  <div id="panel-applicants" class="dash-panel">
    <div class="panel-title">Applicants</div>
    <p class="panel-sub">Students who applied to your roles.</p>
    <select class="applicant-select" id="job-select" onchange="loadApplicants()">
      <option value="">Select a job...</option>
    </select>
    <div id="applicants-list"></div>
  </div>
</div>

<div id="popup"></div>
<footer>Placed · Company Admin · © 2025</footer>

<script>
  var companyAdmin = null;
  var companyJobs  = [];

  // Check auth
  var stored = localStorage.getItem('companyAdmin');
  if (!stored) {
    window.location.href = '/admin-login.html';
  } else {
    companyAdmin = JSON.parse(stored);
    document.getElementById('company-badge').textContent   = companyAdmin.companyName;
    document.getElementById('nav-company-name').textContent = 'Welcome, ' + companyAdmin.username;
    loadCompanyJobs();
  }

  function handleLogout() {
    localStorage.removeItem('companyAdmin');
    window.location.href = '/admin-login.html';
  }

  function switchTab(name) {
    document.querySelectorAll('.dash-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.dash-panel').forEach(function(p) { p.classList.remove('active'); });
    event.target.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  }

  function loadCompanyJobs() {
    fetch('http://localhost:3000/admin/company-jobs/' + companyAdmin.companyId)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (!data.success) return;
        companyJobs = data.jobs;
        renderJobs();
        populateJobSelect();
      });
  }

  function renderJobs() {
    var list = document.getElementById('manage-jobs-list');
    if (companyJobs.length === 0) {
      list.innerHTML = '<p style="color:#888888;">No jobs posted yet.</p>';
      return;
    }
    list.innerHTML = companyJobs.map(function(job) {
      return `
        <div class="job-list-item">
          <div class="job-list-info">
            <h3>${job.title}</h3>
            <p>${job.location} · ${job.type}</p>
            <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
              <span class="meta-pill">Min CGPA: ${job.min_cgpa}</span>
              <span class="meta-pill pill-red">${job.tag}</span>
              <span class="meta-pill">${job.ctc}</span>
            </div>
          </div>
          <button class="btn btn-danger" onclick="deleteJob(${job.id}, this)">🗑 Delete</button>
        </div>
      `;
    }).join('');
  }

  function postJob() {
    var title    = document.getElementById('new-title').value.trim();
    var type     = document.getElementById('new-type').value;
    var tag      = document.getElementById('new-tag').value;
    var location = document.getElementById('new-location').value.trim();
    var ctc      = document.getElementById('new-ctc').value.trim();
    var minCgpa  = document.getElementById('new-cgpa').value;
    var skills   = document.getElementById('new-skills').value.trim();
    var desc     = document.getElementById('new-desc').value.trim();

    if (!title || !location || !ctc || !minCgpa || !desc) {
      showPopup('Please fill in all required fields.');
      return;
    }

    fetch('http://localhost:3000/admin/company-jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title, type, tag, location, ctc,
        min_cgpa: minCgpa, required_skills: skills,
        description: desc, company_id: companyAdmin.companyId
      })
    })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success) {
          showPopup('Job posted! ✓');
          ['new-title','new-location','new-ctc','new-cgpa','new-skills','new-desc']
            .forEach(function(id) { document.getElementById(id).value = ''; });
          loadCompanyJobs();
        } else {
          showPopup('Error: ' + data.error);
        }
      });
  }

  function deleteJob(jobId, btn) {
    if (!confirm('Delete this job?')) return;
    fetch('http://localhost:3000/admin/jobs/' + jobId, { method: 'DELETE' })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success) { showPopup('Deleted. ✓'); loadCompanyJobs(); }
        else showPopup('Could not delete.');
      });
  }

  function populateJobSelect() {
    var select = document.getElementById('job-select');
    select.innerHTML = '<option value="">Select a job...</option>';
    companyJobs.forEach(function(job) {
      var opt = document.createElement('option');
      opt.value = job.id;
      opt.textContent = job.title;
      select.appendChild(opt);
    });
  }

  function loadApplicants() {
    var jobId = document.getElementById('job-select').value;
    var list  = document.getElementById('applicants-list');
    if (!jobId) { list.innerHTML = ''; return; }

    fetch('http://localhost:3000/admin/company-applicants/' + jobId + '/' + companyAdmin.companyId)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (!data.success || data.applicants.length === 0) {
          list.innerHTML = '<p style="color:#888888;">No applicants yet.</p>';
          return;
        }
        list.innerHTML = `
          <table class="data-table">
            <thead>
              <tr><th>Name</th><th>Email</th><th>Department</th><th>CGPA</th><th>Applied</th></tr>
            </thead>
            <tbody>
              ${data.applicants.map(function(a) {
                return `<tr>
                  <td>${a.name}</td>
                  <td style="color:#888888;">${a.email}</td>
                  <td>${a.department}</td>
                  <td style="color:#e8503a; font-weight:700;">${a.cgpa}</td>
                  <td style="color:#888888;">${new Date(a.applied_at).toLocaleDateString('en-IN')}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        `;
      });
  }

  function showPopup(message) {
    var popup = document.getElementById('popup');
    popup.textContent = message;
    popup.style.display = 'block';
    setTimeout(function() { popup.style.display = 'none'; }, 2500);
  }
</script>
</body>
</html>
